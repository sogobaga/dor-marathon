<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DOR 雲端馬拉松 · App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#FFFFFF; --surface:#FFFFFF; --surface-2:#FDFDFD; --surface-3:#F5F5F5;
  --border:#E8E8E8; --border-2:#D0D0D0;
  --tx:#111111; --tx-mid:#606060; --tx-light:#AAAAAA;
  --sage:#C8102E; --sage-bg:#FFF0F2; --sage-deep:#8C0B1E;
  --coral:#1A1A1A; --coral-bg:#F0F0F0; --coral-deep:#000000;
  --honey:#C07B22; --honey-bg:#FEF6E8; --honey-deep:#7E4E0F;
  --lavender:#6B7280; --lavender-bg:#F3F4F6; --lavender-deep:#374151;
  --shadow-xs:0 1px 4px rgba(0,0,0,.05);
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-md:0 6px 24px rgba(0,0,0,.10);
  --r-sm:8px; --r:12px; --r-lg:14px; --r-xl:18px;
  --font-disp:'Plus Jakarta Sans','Noto Sans TC',system-ui,sans-serif;
  --font-body:'Noto Sans TC','Plus Jakarta Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;background:#FFFFFF;}
.dor-board{margin:0;background:#FFFFFF;color:var(--tx);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
.dor-app{position:relative;height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--font-body);display:flex;flex-direction:column;}
.dor-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;cursor:grab;}
.dor-scroll::-webkit-scrollbar{width:0;height:0;}
.has-tabbar .dor-scroll{padding-bottom:74px;}
.dor-scroll.is-dragging,.dor-scroll.is-dragging *{cursor:grabbing !important;}
.dor-scroll button,.dor-scroll .tap,.dor-scroll a{cursor:pointer;}
.dor-grid-tex{display:none;}
.disp{font-family:var(--font-disp);}
.eyebrow{font-family:var(--font-disp);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx-light);font-weight:600;}
.num{font-family:var(--font-disp);font-weight:700;font-variant-numeric:tabular-nums;}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-disp);font-size:11px;font-weight:600;letter-spacing:.02em;padding:4px 10px;border-radius:999px;border:1.5px solid var(--border-2);color:var(--tx-mid);background:var(--surface);white-space:nowrap;}
.chip.fug{color:var(--sage);border-color:rgba(200,16,46,.4);background:var(--surface);}
.chip.hunt{color:var(--tx);border-color:var(--border-2);background:var(--surface);}
.chip.gold{color:var(--tx);border-color:var(--border-2);background:var(--surface);}
.chip.violet{color:var(--tx);border-color:var(--border-2);background:var(--surface);}
.chip.dim{color:var(--tx-light);border-color:var(--border);background:var(--surface);}
.btn{font-family:var(--font-disp);font-weight:700;font-size:16px;border:none;border-radius:14px;padding:15px 20px;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;width:100%;transition:transform .08s ease,filter .12s ease;letter-spacing:.01em;}
.btn:active{transform:scale(.975);}
.btn-primary{background:var(--sage);color:#fff;box-shadow:0 4px 16px rgba(200,16,46,.25);}
.btn-hunt{background:var(--coral);color:#fff;box-shadow:0 4px 16px rgba(26,26,26,.18);}
.btn-gold{background:var(--honey);color:#fff;box-shadow:0 4px 16px rgba(192,123,34,.22);}
.btn-ghost{background:var(--surface);color:var(--tx);border:1.5px solid var(--tx);}
.btn:disabled{filter:grayscale(.5) opacity(.55);cursor:default;box-shadow:none;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);position:relative;box-shadow:var(--shadow-xs);}
.card-pad{padding:16px;}
.bar{height:6px;border-radius:999px;background:var(--border);overflow:hidden;position:relative;}
.bar>i{display:block;height:100%;border-radius:999px;}
.hr{height:1px;background:var(--border);border:0;margin:0;}
.tap{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ph{background:#F5F5F5;display:flex;align-items:center;justify-content:center;color:var(--tx-light);font-family:var(--font-disp);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;text-align:center;}
.tone-fug{color:var(--sage);} .tone-hunt{color:var(--coral);} .tone-gold{color:var(--honey);} .tone-violet{color:var(--lavender);}
.lbl{font-family:var(--font-disp);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx-light);font-weight:600;}
@keyframes dorPulse{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes dorSlideUp{0%{opacity:0;transform:scale(.88) translateY(24px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes dorStar{0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}100%{opacity:0;transform:translateY(-70px) scale(.4) rotate(180deg)}}
.inner-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.inner-tabs::-webkit-scrollbar{display:none;}
.fi{width:100%;padding:11px 13px;border:1.5px solid var(--border-2);border-radius:12px;font-size:14.5px;font-family:var(--font-body);color:var(--tx);background:var(--bg);outline:none;box-sizing:border-box;-webkit-appearance:none;}
.fi:focus{border-color:var(--sage);}
.fi::placeholder{color:var(--tx-light);}
.toggle-seg{display:flex;border:1.5px solid var(--border-2);border-radius:12px;overflow:hidden;background:var(--surface);}
.toggle-seg button{flex:1;padding:10px 0;font-size:13.5px;font-family:var(--font-disp);font-weight:600;border:none;cursor:pointer;transition:background .15s,color .15s;}
.toggle-seg button.on{background:var(--tx);color:#fff;}
.toggle-seg button:not(.on){background:transparent;color:var(--tx-mid);}
.stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px 16px;background:#FFFFFF;}
.switch{position:fixed;top:18px;right:18px;z-index:100;display:flex;gap:8px;}
.switch a{text-decoration:none;font-family:var(--font-disp);font-size:11px;font-weight:600;letter-spacing:.06em;padding:8px 13px;border-radius:999px;border:1.5px solid var(--border-2);color:var(--tx-mid);background:var(--surface);display:inline-flex;align-items:center;gap:6px;box-shadow:var(--shadow-xs);}
.switch a.on{color:var(--tx);border-color:var(--tx);background:var(--surface);}
.switch a:hover{color:var(--tx);}
</style>
</head>

function TopBar({ title, onBack, right }) {

function SafeTop({ h=54 }) { return <div style={{height:h,flexShrink:0}}/>; }
function Bar({ pct, color='var(--sage)' }) {
  return <div className="bar"><i style={{width:Math.min(100,pct)+'%',background:color}}/></div>;
}
function DayDots({ total, now }) {
  return (
    <div style={{display:'flex',gap:4}}>
      {Array.from({length:total}).map((_,i)=>{
        const d=i+1, isDone=d<now, isNow=d===now;
        return <div key={i} style={{flex:1,height:4,borderRadius:999,background:isNow?'var(--sage)':isDone?'rgba(200,16,46,.45)':'var(--border)'}}/>;
      })}
    </div>
  );
}
function StatusBadge({ status }) {
  const t=useT();
  const map = { live:{t:t('status_live'),c:'fug'}, open:{t:t('status_open'),c:'gold'}, soon:{t:t('status_soon'),c:'violet'}, done:{t:t('status_done'),c:'dim'} };
  const s = map[status]||map.done; const live=status==='live';
  return <span className={'chip '+(s.c)} style={{fontWeight:700}}>{live&&<span style={{width:6,height:6,borderRadius:999,background:'var(--sage)',animation:'dorPulse 1.4s infinite',display:'inline-block',marginRight:2}}/>}{s.t}</span>;
}

const LangCtx=React.createContext(['zh',()=>{}]);
function LangProvider({children}){
  const [lang,setLangRaw]=React.useState(()=>{
    try{ return localStorage.getItem('dor_lang')||'zh'; }catch(e){ return 'zh'; }
  });
  const setLang=(l)=>{ setLangRaw(l); try{ localStorage.setItem('dor_lang',l); }catch(e){} };
  return <LangCtx.Provider value={[lang,setLang]}>{children}</LangCtx.Provider>;
}
function useT(){
  const [lang]=React.useContext(LangCtx);
  return (k)=>I18N[lang]?.[k]??I18N.zh[k]??k;
}

const LEVELS=[
  {level:1,name:'新手跑者',   minExp:0,   maxExp:100,  color:'var(--tx-mid)',    badge:'#AAAAAA'},
  {level:2,name:'初級挑戰者', minExp:100, maxExp:300,  color:'var(--sage)',      badge:'#C8102E'},
  {level:3,name:'進階跑者',   minExp:300, maxExp:600,  color:'var(--honey)',     badge:'#C07B22'},
  {level:4,name:'菁英跑者',   minExp:600, maxExp:1000, color:'var(--coral)',     badge:'#1A1A1A'},
  {level:5,name:'傳說跑者',   minExp:1000,maxExp:9999, color:'var(--sage)',      badge:'#C8102E'},
];
function calcExp(p){ return Math.floor(p.totalKm) + p.races*30 + p.rescues*2; }
function getLevelInfo(exp){
  const cur=[...LEVELS].reverse().find(l=>exp>=l.minExp)||LEVELS[0];
  const pct=cur.maxExp<9999?Math.round((exp-cur.minExp)/(cur.maxExp-cur.minExp)*100):100;
  return {...cur,exp,pct};
}

/* 報名資料表單欄位 — 定義於元件外，避免 re-render 時 focus 跳開 */
function RegField({ label, value, onChange, placeholder, type='text' }) {
  return (
    <div>
      <div className="lbl" style={{marginBottom:6,fontSize:9.5}}>{label}</div>
      <input className="fi" type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>
    </div>
  );
}

/* 報名中 / 即將開始 賽事詳情 */
function OpenRaceInfo({ r, nav }) {
  const t=useT();
  const groupType=r.groupType||'distance';
  const groupMode=r.groupMode||'self';
  const [pickDist,setPickDist]=React.useState(r.distances[r.distances.length-1]);
  const [pickGroup,setPickGroup]=React.useState(
    groupType==='faction'?r.factions?.[0]?.id:
    groupType==='club'?r.clubs?.[0]?.id:null
  );
  const [step,setStep]=React.useState('view');
  const [regForm,setRegForm]=React.useState({
    name:    window.DOR?.profile?.name    || '',
    email:   window.DOR?.profile?.email   || '',
    phone:   window.DOR?.profile?.phone   || '',
    address: window.DOR?.profile?.address || '',
    gender:  window.DOR?.profile?.gender  || '',
  });
  const setReg=(k,v)=>setRegForm(f=>({...f,[k]:v}));

  const selFaction=r.factions?.find(f=>f.id===pickGroup);
  const selClub=r.clubs?.find(c=>c.id===pickGroup);
  const ftColor=col=>col==='fug'?'var(--fug)':col==='hunt'?'var(--hunt)':'var(--violet)';
  const ftBg=col=>col==='fug'?'rgba(45,229,154,.08)':col==='hunt'?'rgba(255,75,92,.08)':'rgba(107,114,128,.08)';
  const ftGlow=col=>col==='fug'?'0 4px 16px rgba(45,229,154,.2)':col==='hunt'?'0 4px 16px rgba(255,75,92,.2)':'0 4px 16px rgba(107,114,128,.2)';

  const registerLabel=()=>{
    const base=`${t('btn_register')} · ${pickDist}K`;
    if(groupMode==='random'||groupType==='distance') return base;
    if(groupType==='faction'&&selFaction) return `${t('btn_register')} · ${selFaction.name} · ${pickDist}K`;
    if(groupType==='club'&&selClub) return `${t('btn_register')} · ${selClub.name} · ${pickDist}K`;
    return base;
  };

  return (
    <div style={{padding:'4px 18px 20px'}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
        <span className="chip">{r.world}</span><span className="chip">{r.start}–{r.end}</span><span className="chip">{r.days}{t('unit_days_race')}</span>
      </div>
      {r.blurb&&<p style={{fontSize:14.5,lineHeight:1.7,color:'var(--tx-mid)',margin:'0 0 4px'}}>{r.blurb}</p>}

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <RuleRow icon="id" tone="fug" t={t('rule_id_title')} d={t('rule_id_desc')}/>
        <RuleRow icon="chase" tone="hunt" t={t('rule_daily_title')} d={t('rule_daily_desc')}/>
        <RuleRow icon="rescue" tone="violet" t={t('rule_rescue_title')} d={t('rule_rescue_desc')}/>
        <RuleRow icon="wheel" tone="gold" t={t('rule_mileage_title')} d={t('rule_mileage_desc')}/>
      </div>
      <div className="lbl" style={{marginTop:22,marginBottom:11}}>{t('label_schedule')}</div>
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {[[t('sched_open'),r.start+' 前'],[t('sched_race_start'),r.start],[t('sched_race_end'),r.end],[t('sched_result'),r.end+' 20:00']].map(([l,v],i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'12px 15px',borderTop:i?'1px solid var(--border)':'none'}}>
            <span style={{fontSize:14,color:'var(--tx-mid)'}}>{l}</span>
            <span style={{fontFamily:'var(--font-disp)',fontWeight:700,fontSize:14,color:'var(--tx)'}}>{v}</span>
          </div>
        ))}
      </div>

      {r.status==='open'&&<>
        {/* ── 分組區塊 ── */}
        {groupType!=='distance'&&(groupMode==='random'?(
          /* 隨機分組通知卡 */

            <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
              <div style={{width:40,height:40,borderRadius:12,background:'rgba(107,114,128,.12)',border:'1px solid rgba(107,114,128,.25)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <Icon name="id" size={21} color="var(--lavender)"/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:'var(--tx)',fontSize:14.5}}>{t('group_random_title')}</div>
                <div style={{fontSize:12.5,color:'var(--tx-mid)',marginTop:4,lineHeight:1.55}}>
                  {groupType==='faction'?t('group_random_faction_desc'):t('group_random_club_desc')}
                </div>
                <div style={{display:'flex',gap:7,marginTop:12,flexWrap:'wrap'}}>
                  {groupType==='faction'&&r.factions?.map(f=>(
                    <span key={f.id} style={{padding:'5px 13px',borderRadius:20,fontSize:12.5,fontFamily:'var(--font-disp)',fontWeight:700,color:ftColor(f.color),background:ftBg(f.color),border:`1px solid ${ftColor(f.color)}44`}}>{f.name}</span>
                  ))}
                  {groupType==='club'&&r.clubs?.map(c=>(
                    <span key={c.id} className="chip" style={{fontSize:11.5}}>{c.name}</span>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <>
            <div className="lbl" style={{marginTop:22,marginBottom:11}}>{t('label_pick_faction')}</div>
            <div style={{display:'flex',gap:10}}>
              {r.factions?.map(f=>{
                const on=pickGroup===f.id;
                const tc=ftColor(f.color);
                return (
                  <button key={f.id} className="tap" onClick={()=>setPickGroup(f.id)} style={{flex:1,borderRadius:16,padding:'18px 0',textAlign:'center',border:`1.5px solid ${on?tc:'var(--border-2)'}`,background:on?ftBg(f.color):'var(--surface)',boxShadow:on?ftGlow(f.color):'var(--shadow-xs)',transition:'all .15s'}}>

                    <div style={{fontFamily:'var(--font-disp)',fontWeight:700,fontSize:15,color:on?tc:'var(--tx)',marginTop:8}}>{f.name}</div>
                  </button>
                );
              })}
            </div>
          </>
        ):(
          /* 自選跑團 */
          <>

function WheelScreen({ back }) {
  const t=useT();
  const D=window.DOR; const pool=D.wheel; const n=pool.length; const seg=360/n;
  const colorOf=(c)=>({dim:'#E5E5E5',gold:'#C07B22',fug:'#C8102E',violet:'#6B7280'}[c]||'#CCCCCC');
  const textOf=(c)=>({dim:'#606060',gold:'#7E4E0F',fug:'#8C0B1E',violet:'#374151'}[c]||'#111111');
  const [rot,setRot]=React.useState(0); const [spinning,setSpinning]=React.useState(false); const [result,setResult]=React.useState(null); const [spins,setSpins]=React.useState(Math.floor(D.profile.totalKm/50)-D.profile.spinsUsed);
  const conic=`conic-gradient(${pool.map((p,i)=>`${colorOf(p.color)} ${i*seg}deg ${(i+1)*seg}deg`).join(',')})`;
  const spin=()=>{
    if(spinning||spins<=0)return; setResult(null); setSpinning(true); setSpins(s=>s-1);
    const tot=pool.reduce((a,p)=>a+p.weight,0); let rnd=Math.random()*tot,idx=0;
    for(let i=0;i<n;i++){rnd-=pool[i].weight;if(rnd<=0){idx=i;break;}}
    const target=360*5+(360-(idx*seg+seg/2)); const base=rot-(rot%360); setRot(base+target);
    setTimeout(()=>{setSpinning(false);setResult(pool[idx]);if(pool[idx].kind==='again')setSpins(s=>s+1);},4200);
  };
  return (
    <div className="dor-scroll">
      <SafeTop h={50}/>
      <TopBar title={t('wheel_title')} onBack={back} right={<span className="chip gold" style={{fontWeight:700}}>{t('wheel_remaining')} {spins}</span>}/>
      <div style={{padding:'16px 18px 0',display:'flex',flexDirection:'column',alignItems:'center'}}>
        <div style={{width:0,height:0,borderLeft:'10px solid transparent',borderRight:'10px solid transparent',borderTop:'16px solid var(--honey)',zIndex:3,marginBottom:-6}}/>
        <div style={{position:'relative',width:272,height:272}}>
          <div style={{position:'absolute',inset:0,borderRadius:'50%',background:conic,transform:`rotate(${rot}deg)`,transition:spinning?'transform 4.2s cubic-bezier(.17,.67,.12,1)':'none',boxShadow:'0 0 0 5px var(--surface),0 0 0 7px var(--border),0 16px 40px rgba(0,0,0,.14)'}}>
            {pool.map((p,i)=><div key={i} style={{position:'absolute',left:'50%',top:'50%',transformOrigin:'0 0',transform:`rotate(${i*seg+seg/2}deg) translate(0,-108px)`}}>
              <div style={{transform:'translate(-50%,-50%) rotate(90deg)',width:70,textAlign:'center'}}>
                <div style={{fontSize:10.5,fontWeight:700,fontFamily:'var(--font-disp)',color:textOf(p.color),lineHeight:1.2}}>{p.kind==='line'?`LINE ${p.amount}`:p.label}</div>
              </div>
            </div>)}
          </div>
          <div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',width:58,height:58,borderRadius:'50%',background:'var(--surface)',border:'2px solid var(--border-2)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2,boxShadow:'var(--shadow)'}}>
            <Icon name="bolt" size={22} color="var(--honey)"/>
          </div>
        </div>
        <button className="btn btn-gold" style={{marginTop:22,maxWidth:256}} disabled={spinning||spins<=0} onClick={spin}>
          {spinning?t('btn_spinning'):spins>0?<><Icon name="spin" size={18} color="#fff"/> {t('btn_spin')}</>:t('btn_no_spins')}
        </button>
        <div className="lbl" style={{marginTop:12}}>{t('wheel_note')}</div>
      </div>
      <SectionLabel>{t('sec_prizes')}</SectionLabel>
      <div style={{padding:'0 18px 24px',display:'flex',flexDirection:'column',gap:8}}>
        {pool.map((p,i)=>{
          const tot=pool.reduce((a,x)=>a+x.weight,0);
          return <div key={i} className="card" style={{padding:'11px 14px',display:'flex',alignItems:'center',gap:11}}>
            <span style={{width:11,height:11,borderRadius:4,background:colorOf(p.color),display:'inline-block',flexShrink:0}}/>
            <span style={{flex:1,fontSize:14,color:'var(--tx)'}}>{p.kind==='line'?`LINE Points ${p.amount}`:p.label}</span>
            <span style={{fontSize:12,color:'var(--tx-mid)',fontFamily:'var(--font-disp)',fontWeight:700}}>{Math.round(p.weight/tot*100)}%</span>
          </div>;
        })}
      </div>
      {result&&<WheelResult result={result} onClose={()=>setResult(null)}/>}
    </div>
  );
}

/* ── App Shell ── */
const ROOT={home:'HomeScreen',wheel:'MileageScreen',me:'ProfileScreen'};
const SCREENS={HomeScreen,MileageScreen,ProfileScreen,raceDetail:RaceDetailScreen,mission:MissionScreen,checkin:CheckinScreen,wheel:WheelScreen,stickers:StickerScreen,records:RecordsScreen,login:LoginScreen,settings:SettingsScreen,profileEdit:ProfileEditScreen,dataSync:DataSyncScreen};
const TABS=[{key:'home',label:'賽事',icon:'flag'},{key:'wheel',label:'里程',icon:'wheel'},{key:'me',label:'我的',icon:'user'}];

function DORApp() {
  const [tab,setTabState]=React.useState('home');
  const [stack,setStack]=React.useState([]);
  const [auth,setAuthRaw]=React.useState(()=>{
    try{ const s=localStorage.getItem('dor_auth'); return s?JSON.parse(s):null; }catch(e){ return null; }
  });
  const [levelUp,setLevelUp]=React.useState(null);
  const tl=useT();
  const TAB_LABELS={home:tl('tab_races'),wheel:tl('tab_wheel'),me:tl('tab_me')};

  const nav=(screen,params={})=>setStack(s=>[...s,{screen,params}]);
  const back=()=>setStack(s=>s.slice(0,-1));
  const setTab=(t)=>{setStack([]);setTabState(t);};
  const setAuth=(userData)=>{
    setAuthRaw(userData);
    try{
      if(userData) localStorage.setItem('dor_auth',JSON.stringify(userData));
      else localStorage.removeItem('dor_auth');
    }catch(e){}
    if(userData?.prevLevel && userData.level>userData.prevLevel){
      setLevelUp({from:LEVELS.find(l=>l.level===userData.prevLevel),to:LEVELS.find(l=>l.level===userData.level)});
    }
  };

  const onRoot=stack.length===0;
  const current=onRoot?{screen:ROOT[tab],params:{}}:stack[stack.length-1];
  const Comp=SCREENS[current.screen]||(()=><div style={{padding:40,color:'var(--tx-mid)'}}>—</div>);
  return (
    <div className={`dor-app${onRoot?' has-tabbar':''}`}>
      <Comp route={current.params} nav={nav} back={back} setTab={setTab} auth={auth} setAuth={setAuth}/>
      {onRoot&&<div style={{position:'absolute',left:0,right:0,bottom:0,zIndex:30,paddingBottom:'calc(env(safe-area-inset-bottom) + 16px)',paddingTop:10,display:'flex',background:'var(--surface)',borderTop:'1px solid var(--border-2)'}}>
        {TABS.map(t=>{
          const on=tab===t.key;
          return <button key={t.key} className="tap" onClick={()=>setTab(t.key)} style={{flex:1,background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'4px 0',color:on?'var(--sage)':'var(--tx-light)'}}>
            <Icon name={t.icon} size={24} color={on?'var(--sage)':'var(--tx-light)'}/>
            <span style={{fontSize:10.5,fontWeight:on?700:500,fontFamily:'var(--font-disp)',color:on?'var(--sage)':'var(--tx-light)'}}>{TAB_LABELS[t.key]}</span>
          </button>;
        })}
      </div>}
      {levelUp&&<LevelUpModal from={levelUp.from} to={levelUp.to} onClose={()=>setLevelUp(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <LangProvider><IOSDevice width={390} height={844}><DORApp/></IOSDevice></LangProvider>

<script>
/* 拖曳捲動 + 橡皮筋彈跳回饋
   - 可捲動背景區域：grab 手形游標
   - 拖曳中：grabbing 手形游標
   - 按鈕 / .tap 互動元素：維持 pointer，點擊優先
   - 捲到頂部或底部後繼續拖曳：以阻力感偏移，放開後彈回 */
(function () {
  var drag = null;
  var RESISTANCE = 0.38;           /* 超出邊界時的移動比例 (0=完全卡死, 1=完全跟手) */
  var SNAP = 'transform 0.48s cubic-bezier(0.22, 1, 0.36, 1)'; /* 彈回動畫 */

  function maxScroll(el) {
    return Math.max(0, el.scrollHeight - el.clientHeight);
  }

  document.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return;
    var scroll = e.target.closest('.dor-scroll');
    if (!scroll) return;
    if (e.target.closest('button, a, input, select, textarea, .tap')) return;

    e.preventDefault();
    /* 中斷正在進行的彈回動畫，從當前位置重新開始 */
    scroll.style.transition = 'none';
    scroll.style.transform  = 'translateY(0)';

    drag = {
      scroll:    scroll,
      startY:    e.clientY,
      scrollTop: scroll.scrollTop,
    };
    scroll.classList.add('is-dragging');
  });

  document.addEventListener('mousemove', function (e) {
    if (!drag) return;
    var scroll = drag.scroll;
    var max    = maxScroll(scroll);
    var target = drag.scrollTop - (e.clientY - drag.startY);

    if (target < 0) {
      /* 超出頂部：固定在頂，往下偏移（阻力） */
      scroll.scrollTop       = 0;
      scroll.style.transform = 'translateY(' + (-target * RESISTANCE) + 'px)';
    } else if (target > max) {
      /* 超出底部：固定在底，往上偏移（阻力） */
      scroll.scrollTop       = max;
      scroll.style.transform = 'translateY(' + (-(target - max) * RESISTANCE) + 'px)';
    } else {
      scroll.scrollTop       = target;
      scroll.style.transform = 'translateY(0)';
    }
  });

  function release() {
    if (!drag) return;
    var scroll = drag.scroll;
    drag = null;
    scroll.classList.remove('is-dragging');
    /* 彈回原位 */
    scroll.style.transition = SNAP;
    scroll.style.transform  = 'translateY(0)';
    scroll.addEventListener('transitionend', function onEnd() {
      scroll.style.transition = '';
      scroll.removeEventListener('transitionend', onEnd);
    }, { once: true });
  }

  document.addEventListener('mouseup',    release);
  document.addEventListener('mouseleave', release);
})();
</script>
