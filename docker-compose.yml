services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dor
      POSTGRES_PASSWORD: dor_dev_secret
      POSTGRES_DB: dor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dor -d dor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: bitnamilegacy/pgbouncer:1.22.1
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: dor
      POSTGRESQL_PASSWORD: dor_dev_secret
      POSTGRESQL_DATABASE: dor_db
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    ports:
      - "5433:6432"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      # 本地開發直連 Postgres（pgbouncer 連線池留待正式環境）
      - DATABASE_URL=postgres://dor:dor_dev_secret@postgres:5432/dor_db?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_jwt_secret_change_in_production
      - ENV=development
    volumes:
      - ./services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile.dev
    environment:
      # 本地開發直連 Postgres（pgbouncer 連線池留待正式環境）
      - DATABASE_URL=postgres://dor:dor_dev_secret@postgres:5432/dor_db?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - ENV=development
    volumes:
      - ./services/worker:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
