<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DOR 雲端馬拉松 · 後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-0:#07080b; --bg-1:#0d0f14; --bg-2:#161a23; --bg-3:#1e2330; --bg-4:#272d3c;
  --line:rgba(255,255,255,0.07); --line-2:rgba(255,255,255,0.12); --line-strong:rgba(255,255,255,0.20);
  --tx:#ECEEF3; --tx-dim:#99A1B2; --tx-faint:#5A6173;
  --fug:#2DE59A; --fug-deep:#0c3b2c; --hunt:#FF4B5C; --hunt-deep:#3d1118;
  --gold:#FFC24B; --gold-deep:#3a2b0e; --violet:#9D8CFF; --violet-deep:#241f47;
  --glow-fug:0 0 24px rgba(45,229,154,0.35); --glow-hunt:0 0 24px rgba(255,75,92,0.35); --glow-gold:0 0 22px rgba(255,194,75,0.35);
  --font-disp:'Space Grotesk','Noto Sans TC',system-ui,sans-serif;
  --font-body:'Noto Sans TC','Space Grotesk',system-ui,sans-serif;
  --font-mono:'Space Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;background:#0a0b0e;}
.dor-board{margin:0;background:#0a0b0e;color:var(--tx);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
.disp{font-family:var(--font-disp);}
.mono{font-family:var(--font-mono);}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--tx-faint);}
.num{font-family:var(--font-disp);font-weight:700;font-variant-numeric:tabular-nums;}
.ph{background:repeating-linear-gradient(45deg,rgba(255,255,255,0.035) 0 10px,rgba(255,255,255,0.06) 10px 20px),var(--bg-3);display:flex;align-items:center;justify-content:center;color:var(--tx-faint);font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;text-align:center;}
.tone-fug{color:var(--fug);} .tone-hunt{color:var(--hunt);} .tone-gold{color:var(--gold);} .tone-violet{color:var(--violet);}
.bar{height:8px;border-radius:999px;background:rgba(255,255,255,0.08);overflow:hidden;position:relative;}
.bar>i{display:block;height:100%;border-radius:999px;}
.tap{cursor:pointer;-webkit-tap-highlight-color:transparent;}

/* admin layout */
.adm{display:flex;height:100%;background:var(--bg-1);color:var(--tx);font-family:var(--font-body);position:relative;}
.adm-side{width:232px;flex-shrink:0;background:var(--bg-0);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;}
.adm-logo{display:flex;align-items:center;gap:10px;padding:6px 8px 18px;}
.adm-logo .mark{width:30px;height:30px;border-radius:9px;background:var(--fug);display:flex;align-items:center;justify-content:center;box-shadow:var(--glow-fug);}
.adm-nav{display:flex;flex-direction:column;gap:2px;}
.adm-nav .grp{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--tx-faint);padding:16px 10px 7px;}
.adm-nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;color:var(--tx-dim);font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s,color .12s;text-decoration:none;}
.adm-nav a:hover{background:rgba(255,255,255,.04);color:var(--tx);}
.adm-nav a.on{background:rgba(45,229,154,.1);color:var(--fug);}
.adm-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.adm-top{height:60px;flex-shrink:0;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 26px;background:var(--bg-1);}
.adm-body{flex:1;overflow-y:auto;padding:26px;}
.adm-body::-webkit-scrollbar{width:8px;}
.adm-body::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px;}
.adm-h1{font-family:var(--font-disp);font-weight:700;font-size:22px;}
.adm-sub{color:var(--tx-dim);font-size:13px;margin-top:2px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.kpi{background:var(--bg-2);border:1px solid var(--line);border-radius:16px;padding:18px;}
.kpi .l{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx-faint);}
.kpi .v{font-family:var(--font-disp);font-weight:700;font-size:32px;margin-top:8px;font-variant-numeric:tabular-nums;}
.kpi .d{font-size:12px;margin-top:4px;}
.panel{background:var(--bg-2);border:1px solid var(--line);border-radius:16px;}
.panel-h{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.panel-h .t{font-family:var(--font-disp);font-weight:600;font-size:15px;}
table.adm-tbl{width:100%;border-collapse:collapse;font-size:13.5px;}
.adm-tbl th{text-align:left;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-faint);font-weight:400;padding:12px 18px;border-bottom:1px solid var(--line);}
.adm-tbl td{padding:13px 18px;border-bottom:1px solid var(--line);color:var(--tx);}
.adm-tbl tr:last-child td{border-bottom:none;}
.adm-tbl tr:hover td{background:rgba(255,255,255,.02);}
.abtn{font-family:var(--font-disp);font-weight:600;font-size:13.5px;border:none;border-radius:10px;padding:9px 15px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
.abtn-pri{background:var(--fug);color:#05140e;}
.abtn-gh{background:rgba(255,255,255,.05);color:var(--tx);border:1px solid var(--line-2);}
.tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--line-2);color:var(--tx-dim);}
.tag.g{color:var(--fug);border-color:rgba(45,229,154,.4);background:rgba(45,229,154,.08);}
.tag.r{color:var(--hunt);border-color:rgba(255,75,92,.4);background:rgba(255,75,92,.08);}
.tag.y{color:var(--gold);border-color:rgba(255,194,75,.4);background:rgba(255,194,75,.08);}
.tag.v{color:var(--violet);border-color:rgba(157,140,255,.4);background:rgba(157,140,255,.08);}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-faint);}
.field input,.field select{background:var(--bg-1);border:1px solid var(--line-2);border-radius:10px;padding:10px 12px;color:var(--tx);font-family:var(--font-body);font-size:14px;}
.field input:focus,.field select:focus{outline:none;border-color:var(--fug);}

.stage{height:100vh;background:var(--bg-1);}
#root{height:100%;}
</style>
</head>
<body class="dor-board">
<div class="stage"><div id="root"></div></div>

<script type="text/babel" data-presets="react">
/* ── Icon ── */
function Icon({ name, size=24, color='currentColor', sw=1.8 }) {

  const F={fill:color,stroke:'none'};
  const paths={
    target:<g {...p}><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" {...F}/></g>,

    id:<g {...p}><rect x="3" y="5" width="18" height="14" rx="3"/><circle cx="8.5" cy="11" r="2"/><path d="M6 16c.4-1.4 1.5-2 2.5-2s2.1.6 2.5 2M14 9.5h5M14 13h5"/></g>,
    decoy:<g {...p}><circle cx="12" cy="12" r="8.5"/><path d="M12 12l4-4M9 12h.01M12 9v.01"/></g>,

    stealth:<g {...p}><path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="2.4"/></g>,
    pin:<g {...p}><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12Z"/><circle cx="12" cy="9" r="2.5"/></g>,
    plus:<g {...p}><path d="M12 5v14M5 12h14"/></g>,
    settings:<g {...p}><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M5 5l2 2M17 17l2 2M2 12h3M19 12h3M5 19l2-2M17 7l2-2"/></g>,
    bell:<g {...p}><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10.5 19a2 2 0 0 0 3 0"/></g>,
    arrowUp:<g {...p}><path d="M12 19V5M6 11l6-6 6 6"/></g>,
    route:<g {...p}><path d="M3 17c0-2 1.5-4 4-4h8c2.5 0 4-2 4-4 0-2.2-1.8-4-4-4h-2M6 21l-3-3 3-3"/></g>,

/* ── Admin Helpers ── */
function StatusTag({ s }) {
  const m={live:['進行中','g'],open:['報名中','y'],soon:['即將開始','v'],done:['已結束','']};
  const [t,c]=m[s]||m.done;
  return <span className={'tag '+c}>{t}</span>;
}
const ovl={position:'absolute',inset:0,zIndex:50,background:'rgba(5,6,9,.7)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',padding:30};

            <div style={{height:12,borderRadius:999,overflow:'hidden',display:'flex',background:'var(--hunt)'}}><div style={{width:'58%',background:'var(--fug)',boxShadow:'var(--glow-fug)'}}/></div>

      <div className="panel">

        <table className="adm-tbl">

/* ── 權限管理 ── */
function PermissionsAdmin(){
  const roles=['超級管理員','管理員','操作員','客服'];
  const perms=[
    {cat:'賽事管理',items:['查看賽事','建立賽事','編輯賽事','刪除賽事']},
    {cat:'報名管理',items:['查看報名','審核報名','匯出報名']},
    {cat:'訂單管理',items:['查看訂單','處理退款','匯出訂單']},
    {cat:'用戶管理',items:['查看用戶','編輯用戶','停用用戶']},
    {cat:'推播通知',items:['查看紀錄','手動推播','編輯模板']},
    {cat:'陣營設定',items:['查看陣營','調整陣營']},
    {cat:'管理員設定',items:['查看管理員','新增管理員','編輯權限']},
    {cat:'系統設定',items:['查看設定','修改設定','操作紀錄']},
  ];
  const defaults={
    超級管理員:()=>true,
    管理員:(c,p)=>!['刪除賽事','停用用戶','新增管理員','編輯權限','修改設定','操作紀錄'].includes(p),
    操作員:(c,p)=>['查看賽事','查看報名','查看訂單','查看用戶','查看紀錄','手動推播','查看陣營'].includes(p),
    客服:(c,p)=>['查看報名','查看訂單','查看用戶'].includes(p),
  };
  const [checks,setChecks]=React.useState(()=>{
    const m={};
    perms.forEach(({cat,items})=>items.forEach(p=>roles.forEach(r=>{m[`${r}:${p}`]=defaults[r](cat,p);})));
    return m;
  });
  const toggle=(r,p)=>setChecks(c=>({...c,[`${r}:${p}`]:!c[`${r}:${p}`]}));
  return <div style={{display:'flex',flexDirection:'column',gap:20}}>
    <div className="panel">
      <div className="panel-h"><span className="t">角色權限矩陣</span><button className="abtn abtn-g" style={{fontSize:12,marginLeft:'auto'}}>儲存設定</button></div>
      <div style={{overflowX:'auto'}}>
        <table className="adm-tbl" style={{minWidth:700}}>
          <thead><tr><th style={{textAlign:'left'}}>功能</th>{roles.map(r=><th key={r} style={{textAlign:'center',minWidth:100}}>{r}</th>)}</tr></thead>
          <tbody>{perms.map(({cat,items})=><React.Fragment key={cat}>
            <tr style={{background:'var(--bg)'}}><td colSpan={roles.length+1} style={{fontWeight:700,fontSize:11,color:'var(--tx-dim)',padding:'10px 12px',textTransform:'uppercase',letterSpacing:1}}>{cat}</td></tr>
            {items.map(p=><tr key={p}>
              <td style={{paddingLeft:24,color:'var(--tx-dim)',fontSize:13}}>{p}</td>
              {roles.map(r=><td key={r} style={{textAlign:'center'}}>
                <input type="checkbox" checked={!!checks[`${r}:${p}`]} onChange={()=>r!=='超級管理員'&&toggle(r,p)} style={{accentColor:'var(--fug)',width:16,height:16,cursor:r==='超級管理員'?'not-allowed':'pointer'}} disabled={r==='超級管理員'}/>
              </td>)}
            </tr>)}
          </React.Fragment>)}
          </tbody>
        </table>
      </div>
    </div>
  </div>;
}

/* ── 多語言管理 ── */
function I18nAdmin(){
  const [lang,setLang]=React.useState('en');
  const [search,setSearch]=React.useState('');
  const keys=[
    {key:'tab.races',zh:'賽事',en:'Events',ja:'レース',cat:'導航'},
    {key:'tab.wheel',zh:'里程',en:'Miles',ja:'マイル',cat:'導航'},
    {key:'tab.me',zh:'我的',en:'Me',ja:'マイページ',cat:'導航'},
    {key:'status.live',zh:'進行中',en:'Live',ja:'開催中',cat:'狀態'},
    {key:'status.open',zh:'報名中',en:'Open',ja:'受付中',cat:'狀態'},
    {key:'status.soon',zh:'即將開始',en:'Coming Soon',ja:'まもなく開始',cat:'狀態'},
    {key:'status.done',zh:'已完賽',en:'Finished',ja:'終了',cat:'狀態'},
    {key:'btn.register',zh:'立即報名',en:'Register Now',ja:'今すぐ登録',cat:'按鈕'},
    {key:'btn.back',zh:'返回',en:'Back',ja:'戻る',cat:'按鈕'},
    {key:'btn.confirm',zh:'確認',en:'Confirm',ja:'確認',cat:'按鈕'},
    {key:'label.lang',zh:'語言',en:'Language',ja:'言語',cat:'設定'},
    {key:'label.zh',zh:'中文',en:'Chinese',ja:'中国語',cat:'設定'},
    {key:'label.en',zh:'英文',en:'English',ja:'英語',cat:'設定'},
    {key:'label.ja',zh:'日文',en:'Japanese',ja:'日本語',cat:'設定'},
    {key:'race.detail',zh:'賽事詳情',en:'Race Details',ja:'レース詳細',cat:'賽事'},
    {key:'race.group',zh:'組別',en:'Group',ja:'グループ',cat:'賽事'},
    {key:'mission.daily',zh:'每日任務',en:'Daily Mission',ja:'デイリーミッション',cat:'任務'},
    {key:'mission.rescue',zh:'救援任務',en:'Rescue Mission',ja:'救助ミッション',cat:'任務'},
  ];
  const cats=['全部',...new Set(keys.map(k=>k.cat))];
  const [cat,setCat]=React.useState('全部');
  const langs=['en','ja'];
  const lname={en:'英文',ja:'日文'};
  const [edits,setEdits]=React.useState({});
  const list=keys.filter(k=>(cat==='全部'||k.cat===cat)&&(!search||k.key.includes(search)||k.zh.includes(search)));
  const completion=lang=>{
    const filled=keys.filter(k=>k[lang]&&k[lang].trim()).length;
    return Math.round(filled/keys.length*100);
  };
  return <div style={{display:'flex',flexDirection:'column',gap:20}}>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
      {['zh',...langs].map(l=>{
        const pct=l==='zh'?100:completion(l);
        return <div className="kpi" key={l}>
          <div className="l">{l==='zh'?'中文（基準）':lname[l]}</div>
          <div className="v" style={{color:'var(--fug)'}}>{pct}%</div>
          <div style={{height:4,borderRadius:999,background:'var(--line)',marginTop:8}}>
            <div style={{width:pct+'%',height:'100%',borderRadius:999,background:'var(--fug)'}}/>
          </div>
          <div className="d" style={{color:'var(--tx-dim)',marginTop:4}}>{pct===100?'已完成翻譯':`${keys.length-Math.round(pct/100*keys.length)} 個待翻譯`}</div>
        </div>;
      })}
    </div>
    <div className="panel">
      <div className="panel-h" style={{flexWrap:'wrap',gap:8}}>
        <span className="t">翻譯詞條</span>
        <div style={{display:'flex',gap:6}}>
          {langs.map(l=><button key={l} className={'abtn '+(lang===l?'abtn-g':'')} style={{fontSize:12}} onClick={()=>setLang(l)}>{lname[l]}</button>)}
        </div>
        <div style={{display:'flex',gap:6}}>
          {cats.map(c=><button key={c} className={'abtn '+(cat===c?'abtn-g':'')} style={{fontSize:11}} onClick={()=>setCat(c)}>{c}</button>)}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋 key 或中文…" style={{background:'var(--card)',border:'1px solid var(--line)',borderRadius:8,padding:'5px 10px',color:'var(--tx)',fontSize:13,width:180}}/>
      </div>
      <table className="adm-tbl">
        <thead><tr><th>Key</th><th>分類</th><th>中文（基準）</th><th>{lname[lang]}</th><th>狀態</th></tr></thead>
        <tbody>{list.map((k,i)=>{
          const val=edits[`${lang}:${k.key}`]??k[lang]??'';
          const missing=!k[lang];
          return <tr key={i}>
            <td className="mono" style={{fontSize:11,color:'var(--tx-dim)'}}>{k.key}</td>
            <td><span className="tag">{k.cat}</span></td>
            <td style={{fontWeight:600}}>{k.zh}</td>
            <td><input value={val} onChange={e=>setEdits(ed=>({...ed,[`${lang}:${k.key}`]:e.target.value}))} style={{background:'var(--card)',border:'1px solid var(--line)',borderRadius:6,padding:'4px 8px',color:'var(--tx)',fontSize:13,width:'100%'}}/></td>
            <td><span className="tag" style={{color:missing?'var(--hunt)':'var(--fug)',borderColor:(missing?'var(--hunt)':'var(--fug)')+'44'}}>{missing?'待翻譯':'已完成'}</span></td>
          </tr>;
        })}</tbody>
      </table>
      <div style={{padding:'12px 0 0',display:'flex',justifyContent:'flex-end'}}><button className="abtn abtn-g">儲存翻譯</button></div>
    </div>
  </div>;
}
