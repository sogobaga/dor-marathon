name: Neon usage monitor

# 每 6 小時檢查 Neon compute 用量；超預算或「compute 幾乎不休眠(疑似 24/7 迴歸)」就發 Telegram。
# 只打 Neon 控制台 API + Telegram，不連資料庫、不會喚醒 Neon compute。
# 需在 repo Settings → Secrets and variables → Actions 設定：
#   NEON_API_KEY, NEON_PROJECT_ID, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小時（UTC）
  workflow_dispatch:
    inputs:
      force_notify:
        description: '強制發一則 Telegram（測試用）'
        type: boolean
        default: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run Neon usage monitor
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BUDGET_CU_HR: '80' # ← 月預算(CU-hr)。軟上線抓 ~50-80；1000 會員時調到 ~200。
          WARN_PCT: '0.75' # 已用達預算 75% 就警示
          STORAGE_ALERT_GB: '5' # DB 容量超過就警示（現在 ~0.21GB）
          USD_TWD: '32' # 匯率(估費用用)
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify }}
        run: python3 scripts/neon_usage_monitor.py
